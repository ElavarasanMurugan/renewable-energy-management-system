server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: solar-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/solar-panels/**

            - id: wind-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/wind-turbines/**

            - id: battery-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/batteries/**

            - id: distribution-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/distribution/**